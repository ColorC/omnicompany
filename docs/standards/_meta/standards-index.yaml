  # plan 模板细则 — 从属于 STANDARD-PLAN, 冲突时以 concepts/plan.md 为准
  - id: PLAN-TEMPLATE
    file: docs/standards/protocol/plan_template.md
    applies_to: [plan_md]
    path_match:
