      - "docs/standards/**/*.md"
      - "templates/**/*.md"
      - "src/omnicompany/packages/services/_core/guardian/{README,DESIGN,SKILL}.md"
    excerpt_strategy: full

  # PROJECT_INDEX.md 契约 (2026-06-13 立 — 此前契约只活在代码常量, 缺权威文档)
  - id: STANDARD-PROJECT-INDEX
    file: docs/standards/concepts/project_index.md
