# [OMNI] origin=claude-code domain=standards ts=2026-04-18T00:00:00Z type=manifest status=active
# [OMNI] material_id="material:standards.meta.standards_index_routing_manifest.yaml"
# 标准库索引 — SemanticAuditor 路由依据
#
# 目的：把"某类 artifact 应该用哪些 standards 的哪些节审" 变成机器可读。
# SemanticAuditor 的 StandardMatcherRouter 读本文件决定审谁取什么。
# 规范演化时更新本文件；新增 standards 必须同步加一条。
#
# artifact 类型 (kind)：
#   worker          — Router/Worker .py 文件（含子类定义, omnicompany 新名 = Worker）
#   worker_doc      — knowledge/routers/**/*.md (过渡期保留 routers 路径)
#   material        — Material 定义 .md 或 formats.py（omnicompany 新名 = Material）
#   llm_call        — 任何含 LLM 调用的 .py 或 AgentNodeLoop 定义
#   team            — pipeline.py / team 定义（omnicompany 新名 = Team）
#   design_md       — DESIGN.md
#   plan_md         — docs/plans/*/plan.md
#   standard_md     — docs/standards/*.md（meta，用于规范自审）
#   theory_md       — docs/theory/*.md
#   template        — omnicompany/templates/<kind>/{范本,骨架,向导,注册件}.{md,py,yaml}
#                     基础概念模板四件套, 教学示范代码 + 抽象诠释 + 注册时校验项
#   sandbox_md      — .omni/sandbox/** 沙盒目录下的草案文件 (待审 / 待迁移到正式区)
#   cli_doc         — omnicompany CLI 相关规范文档跟实装代码
#   ai_ide_workflow — AI IDE 写入前必走的注册 / 沙盒 / 反思流程相关材料
#
# excerpt_strategy：
#   full            — 整份标准喂给 LLM（小/核心规范）
#   section         — 只喂 key_sections 列出的 ## 二级标题块
#
# path_match：glob 模式，支持多个（OR）；命中 → 该 standard 适用。

standards:

  - id: PROGRESSIVE-CONTEXT-KIND-AUTHORING
    file: docs/standards/protocol/progressive_context.md
    applies_to: [worker, llm_call, team, material]
    path_match:
      - "src/omnicompany/**/routers/**/*.py"
      - "src/omnicompany/**/routers.py"
      - "src/omnicompany/**/workers/**/*.py"
      - "src/omnicompany/**/pipeline.py"
      - "src/omnicompany/**/knowledge/formats/**/*.md"
    excerpt_strategy: full

  - id: STANDARD-WORKER
    file: docs/standards/concepts/worker.md
    applies_to: [worker, worker_doc, llm_call]
    path_match:
      - "src/omnicompany/**/routers/**/*.py"
      - "src/omnicompany/**/routers.py"
      - "src/omnicompany/**/workers/**/*.py"
      - "src/omnicompany/**/knowledge/routers/**/*.md"
    excerpt_strategy: full

  - id: STANDARD-MATERIAL
    file: docs/standards/concepts/material.md
    applies_to: [material]
    path_match:
      - "src/omnicompany/**/knowledge/formats/**/*.md"
      - "src/omnicompany/**/formats.py"
    excerpt_strategy: full

  - id: STANDARD-TEAM
    file: docs/standards/concepts/team.md
    applies_to: [team]
    path_match:
      - "src/omnicompany/**/pipeline.py"
    excerpt_strategy: full

  - id: LLM-FIRST
    file: docs/standards/_global/llm_first.md
    applies_to: [llm_call, router]
    path_match:
      - "src/omnicompany/**/routers/**/*.py"
      - "src/omnicompany/**/routers.py"
      - "src/omnicompany/**/agent/**/*.py"
    excerpt_strategy: full

  - id: COUNTEREXAMPLE-LEDGER
    file: docs/standards/_global/counterexample_ledger.md
    applies_to: [llm_call, router]
    path_match:
      - "src/omnicompany/**/*.py"
    excerpt_strategy: full

  - id: INFO-SUFFICIENCY
    file: docs/standards/_global/information_sufficiency.md
    applies_to: [llm_call, router]
    path_match:
      - "src/omnicompany/**/routers/**/*.py"
      - "src/omnicompany/**/routers.py"
      - "src/omnicompany/**/agent/**/*.py"
    excerpt_strategy: section
    key_sections:
      - "## 一、问题根源"
      - "## 二、三层防御体系"
      - "## 三、节点信息规范（扩展 FORMAT 标准）"
      - "## 七、核心认知：降维与符号完备性（2026-04-14 补）"

  - id: AGENT-TOOLS
    file: docs/standards/concepts/agent_tools.md
    applies_to: [llm_call]
    path_match:
      - "src/omnicompany/**/agent/**/*.py"
      - "src/omnicompany/packages/services/agent/**/*.py"
    excerpt_strategy: full

  - id: CODE
    file: docs/standards/_global/code.md
    applies_to: [router, llm_call, pipeline]
    path_match:
      - "src/omnicompany/**/*.py"
    excerpt_strategy: full

  - id: OMNI-HEADER
    file: docs/standards/cli/omni-header.md
    applies_to: [design_md, format, router_doc, plan_md, standard_md, theory_md]
    path_match:
      - "**/DESIGN.md"
      - "src/omnicompany/**/knowledge/**/*.md"
      - "docs/plans/**/plan.md"
      - "docs/standards/**/*.md"
      - "docs/theory/**/*.md"
    excerpt_strategy: full

  # 自我叙事三件套 — DESIGN/README/SKILL 的现行权威 (2026-06-13 用户裁决"冲突以新为准")
  - id: SELF-creative_content-THREE-FILES
    file: docs/standards/protocol/self_creative_content_three_files.md
    applies_to: [design_md, readme_md, skill_md]
    path_match:
      - "**/DESIGN.md"
      - "src/omnicompany/**/README.md"
      - "src/omnicompany/**/SKILL.md"
    excerpt_strategy: full

  # DESIGN.md 模板细则 — 从属于 SELF-creative_content-THREE-FILES, 冲突时以三件套为准
  - id: DESIGN-MD-TEMPLATE
    file: docs/standards/protocol/design_md_template.md
    applies_to: [design_md]
    path_match:
      - "**/DESIGN.md"
    excerpt_strategy: full

  - id: DISTRIBUTED-DOCS
    file: docs/standards/_global/distributed-docs.md
    applies_to: [design_md, plan_md, standard_md, theory_md]
    path_match:
      - "**/DESIGN.md"
      - "docs/**/*.md"
    excerpt_strategy: section
    key_sections:
