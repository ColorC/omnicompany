      - "## 四、放置规则（目录白名单）"
      - "## 六、尺寸与拆分触发器"

  - id: TERMINOLOGY
    file: docs/standards/_global/terminology.md
    applies_to: [worker, worker_doc, material, team, design_md, plan_md, standard_md, theory_md, llm_call]
    path_match:
      - "src/omnicompany/**/*.py"
      - "src/omnicompany/**/*.md"
      - "docs/**/*.md"
    excerpt_strategy: full

  - id: WORKSPACE-ISOLATION-AND-TEST-DISCRIMINATION
    file: docs/standards/_global/workspace_isolation_and_test_discrimination.md
    applies_to: [worker, team, llm_call, design_md]
    path_match:
      - "src/omnicompany/**/run.py"
      - "src/omnicompany/**/workers/**/*.py"
      - "src/omnicompany/**/pipeline.py"
      - "**/DESIGN.md"
    excerpt_strategy: full

  - id: STANDARD-TEMPLATE
    file: docs/standards/concepts/template.md
    applies_to: [template]
    path_match:
      - "omnicompany/templates/**/范本.*"
      - "omnicompany/templates/**/骨架.*"
      - "omnicompany/templates/**/向导.md"
      - "omnicompany/templates/**/注册件.yaml"
      - "templates/**/范本.*"
      - "templates/**/骨架.*"
      - "templates/**/向导.md"
      - "templates/**/注册件.yaml"
    excerpt_strategy: full

  - id: STANDARD-SANDBOX
    file: docs/standards/cli/sandbox.md
    applies_to: [sandbox_md, ai_ide_workflow]
    path_match:
      - ".omni/sandbox/**/*.md"
      - ".omni/sandbox/**/*.py"
      - ".omni/sandbox/**/*.yaml"
    excerpt_strategy: full

  - id: STANDARD-OMNICOMPANY-CLI
    file: docs/standards/cli/omnicompany_cli.md
    applies_to: [cli_doc, ai_ide_workflow]
    path_match:
      - "src/omnicompany/cli/**/*.py"
    excerpt_strategy: full

  - id: STANDARD-CLAUDE-CODE-SUBAGENT-WORKER
    file: docs/standards/cli/claude_code_subagent_worker.md
    applies_to: [cli_doc, llm_call, plan_md]
    path_match:
      - "docs/standards/cli/claude_code_subagent_worker.md"
      - ".claude/skills/omni-claude-worker/SKILL.md"
      - "src/omnicompany/cli/commands/worker.py"
      - "tests/cli/test_worker_command.py"
      - "docs/plans/**/worker-specs/**/*.md"
      - "docs/plans/**/specs/**/*.md"
    excerpt_strategy: full

  # plan 唯一权威规范 (2026-06-13 起; plan_template.md 为其 protocol 层模板细则)
  - id: STANDARD-PLAN
    file: docs/standards/concepts/plan.md
    applies_to: [plan_md, doc]
    path_match:
