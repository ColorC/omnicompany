    excerpt_strategy: full

# ─── kind 推断规则（StandardMatcherRouter 用） ─────────────────
# 顺序评估，首条匹配即生效。
kind_inference:
  - kind: material
    match:
      - "src/omnicompany/**/knowledge/formats/**/*.md"
      - "src/omnicompany/**/formats.py"

  - kind: worker_doc
    match:
      - "src/omnicompany/**/knowledge/routers/**/*.md"

  - kind: team
    match:
      - "src/omnicompany/**/pipeline.py"

  - kind: worker
    match:
      - "src/omnicompany/**/routers/**/*.py"
      - "src/omnicompany/**/routers.py"
      - "src/omnicompany/**/workers/**/*.py"

  - kind: llm_call
    match:
      - "src/omnicompany/**/agent/**/*.py"
      - "src/omnicompany/packages/services/agent/**/*.py"

  - kind: design_md
    match:
      - "**/DESIGN.md"

  - kind: plan_md
    match:
      - "docs/plans/**/plan.md"

  - kind: standard_md
    match:
      - "docs/standards/**/*.md"

  - kind: plan_md
    match:
      - "docs/plans/**/plan.md"     # 含主题区 + omnicompany- 元区 + _archive

  - kind: theory_md
    match:
      - "docs/theory/**/*.md"

  - kind: template
    match:
      - "omnicompany/templates/**/*"
      - "templates/**/*"

  - kind: sandbox_md
    match:
      - ".omni/sandbox/**/*"

  - kind: context_binding
    match:
      - "docs/standards/_meta/context-bindings.yaml"
      - "src/omnicompany/cli/commands/context.py"
