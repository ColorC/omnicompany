  # 核心设施统一/唯一权威收束 — 方向在 authority-confirmation.md, 执行门禁在 autonomous-execution-rules.md
  - id: AUTHORITY-CONVERGENCE
    file: docs/plans/agent-framework/[2026-06-13]LLM-CALL-UNIFICATION/authority-confirmation.md
    applies_to: [plan_md, standard_md, template, cli_doc]
    path_match:
