name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mkdocs-material
        run: python -m pip install mkdocs-material
      - name: Build + deploy to gh-pages
        run: mkdocs gh-deploy --force
