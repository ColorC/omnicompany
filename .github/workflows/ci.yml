name: CI
on: [push, pull_request]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      OMNICOMPANY_SKIP_GUARDIAN_PRECHECK: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"
      - name: Syntax check
        run: python -m compileall -q src
      - name: Unit tests
        run: python -m pytest tests/ -q
      - name: CLI smoke
        run: |
          omni --help
          omni health
      - name: Domain plugin contract
        run: python scripts/validate_domains.py
      - name: Guardian directory-health
        run: omni guardian patrol --json-out || true

  portability:
    name: Clean-env install smoke (stranger's machine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build tooling
        run: python -m pip install build
      - name: Clean-env smoke
        run: python scripts/clean_env_smoke.py

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      # 只阻断真 bug(语法错误 / pyflakes 错误类)。undefined-name(F82)因 ruff 对
      # 字符串前向引用注解误报而未纳入; 海量 cosmetic(F401/F541 等)留 good-first-issue。
      - name: Critical lint (syntax / pyflakes errors)
        run: ruff check src --select E9,F63,F7
