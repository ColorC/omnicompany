name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          if-no-files-found: error

  build-executable:
    name: Build executable (${{ matrix.asset-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset-name: omni-linux-x86_64
            binary-path: dist/omni
          - os: windows-latest
            asset-name: omni-windows-x86_64.exe
            binary-path: dist/omni.exe
          # macOS 暂不出原生可执行: 免费版 macOS runner 排队不可靠(macos-13 已弃用)。
          # macOS 用户走 `pip install`(跨平台 wheel)。有需求再加回 macos-latest。

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: python -m pip install --upgrade pip pyinstaller .

      - name: Build single-file executable
        run: pyinstaller --onefile --name omni --collect-all omnicompany scripts/pyinstaller_entry.py

      - name: Rename executable asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "${{ matrix.binary-path }}" "release-assets/${{ matrix.asset-name }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: release-assets/${{ matrix.asset-name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-executable

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
