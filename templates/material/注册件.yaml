# ════════════════════════════════════════════════════════════════════════
# v2 配套 (2026-05-02 加): material 用法
#   - 类名: Material (从 services/_core/omnicompany 导入, 是 protocol.format.Format 的 alias)
#   - Registry: FormatRegistry (旧名 grandfathered, 跟真业务 services/_diagnosis/semantic_auditor/formats.py 同形态)
#   - 跟元 IO 联动: 一个 material 经过的 tool 调用, tool 会声明 CONSUMED/PRODUCED_META_IO
#                    诊断 / G4 锁可反查 material 流转的 IO 边界
# 三层分类: docs/standards/_global/concepts_three_layers.md (material 在层一 AI 控制体系)
# 元 IO: docs/standards/cli/meta_io.md
# 单源 + 薄包装: docs/standards/_global/single_source_thin_wrap.md
# ════════════════════════════════════════════════════════════════════════

# ════════════════════════════════════════════════════════════════════════
# 重要 — 关于下面 checks 字段的实装状态:
#
# 下面列出的 checks 是**契约层骨架**, 描述每条规则的判定逻辑跟期望行为. rule 字段
# 当前是**未实现的代码** (例如 `parse_omnimark(file).is_canonical_v3()` /
# `ast_extract_constant(file, 'DOMAIN')`), 对应的真函数没在仓库里实装.
#
# 阶段三 omnicompany CLI 实装时按这份骨架补:
#   1. 真实装函数 (在 omnicompany CLI 的 lint 引擎模块里)
#   2. 红绿测试基线 — 每条 check 至少配一对测试: 一个合规样本应通过 + 一个违规样本应失败
#   3. 跑一次 lint 跟测试基线对照, 出入 → 修 lint 函数 (而不是改测试或改这份 yaml)
#
# 测试基线骨架建在 tests/templates/material/ 下面 (阶段三建立时):
#   tests/templates/material/test_material_template.py — 跑全部 checks
#   tests/templates/material/fixtures/合规样本.py        — 应通过的样本 (基于本范本.py)
#   tests/templates/material/fixtures/违规样本/         — 每条 check 一份违规样本
#     ├── 缺kind标.py            (违 material-006)
#     ├── description太短.py     (违 material-005)
#     ├── id不带domain前缀.py    (违 material-008)
#     └── ...
#
# 现状: 测试基线骨架未建立. 如果用户审过这份模板要进入实装阶段, 第一件事是**先建
# 测试基线**让 checks 的契约具体化, 然后才补 lint 函数. 这跟"先建预期测试再补
# 实装代码"的工程纪律一致, 避免实装代码跟 yaml 描述对不上.
# ════════════════════════════════════════════════════════════════════════

kind: material

instance_naming:
  pattern: "formats.py"
  description: |
    一个服务包/领域包的所有 Material 定义放在同一个 formats.py 文件里, 文件名固定.
    这个文件名是历史约定 (Format 是 Material 的协议层旧名), 跟 BUILTIN_FORMATS 体系一致.
    一个包内多个 Material 用 ALL_MATERIALS 列表组织, 不分多个 *.py 文件.

instance_location:
  pattern: "src/omnicompany/packages/<package_type>/<package_name>/[<sub_package>/]formats.py"
  description: |
    Material 定义文件就近放在它所属服务包/领域包的根目录, 跟该包的工人/团队代码同目录.
    这是材料规范"就近存放"的字面体现 (材料属于谁的就放谁的目录).
  variables:
    package_type: services | domains | custom 三选一
    package_name: 服务包名 (例如 csv_to_md / gameplay_system / voxel_engine / report_author / ...)
    sub_package: 可选, 大型领域包按子领域分时用 (例如 gameplay_system/team_table/, gameplay_system/ux/)

required_fields:
  omnimark_header:
    - origin
    - ts
    - type           # 必须 == "config" (formats.py 文件类型是 config)
    - summary
    - why
    - tags           # 必须含 "material" 或 "formats"
  python_module:
    - "DOMAIN 常量声明"            # 例如 DOMAIN = "csv_to_md"
    - "至少 1 个 Material() 定义"
    - "ALL_MATERIALS 列表"
    - "register_formats 函数"
  per_material_required_fields:    # 每份 Material() 实例必有
    - "id"
    - "name"
    - "description"   # 五要素齐
    - "parent"
    - "json_schema"
    - "tags"          # 必须含 kind.* 之一 + domain.*
    - "examples"      # 至少 1 个

checks:
  - id: "material-001"
    description: "OmniMark 头 v3 五字段齐"
    rule: "parse_omnimark(file).is_canonical_v3()"

  - id: "material-002"
    description: "DOMAIN 常量声明且非空"
    rule: "ast_extract_constant(file, 'DOMAIN') is not None and ast_extract_constant(file, 'DOMAIN') != ''"

  - id: "material-003"
    description: "至少 1 个 Material() 实例"
    rule: "count_format_calls(file) >= 1"

  - id: "material-004"
    description: "ALL_MATERIALS 列表存在且包含所有 Material 实例"
    rule: "ast_extract_list(file, 'ALL_MATERIALS') and set(ast_extract_list(file, 'ALL_MATERIALS')) == set(ast_extract_format_names(file))"

  - id: "material-005"
    description: "每份 Material 的 description 至少 200 字符 (五要素需要的最低体量)"
    rule: "all(len(m.description) >= 200 for m in ast_extract_format_calls(file))"

  - id: "material-006"
    description: "每份 Material 的 tags 含 kind.* 之一 (F-19 强制)"
    rule: "all(any(t.startswith('kind.') for t in m.tags) for m in ast_extract_format_calls(file))"

  - id: "material-007"
    description: "每份 Material 的 tags 含 domain.* (业务域归属)"
    rule: "all(any(t.startswith('domain.') for t in m.tags) for m in ast_extract_format_calls(file))"

  - id: "material-008"
    description: "每份 Material 的 id 跟 DOMAIN 常量一致 (id 以 DOMAIN. 开头)"
    rule: "all(m.id.startswith(ast_extract_constant(file, 'DOMAIN') + '.') for m in ast_extract_format_calls(file))"

  - id: "material-009"
    description: "每份 Material 至少 1 个 example"
    rule: "all(len(m.examples) >= 1 for m in ast_extract_format_calls(file))"

  - id: "material-010"
    description: "register_formats 函数存在且签名正确"
    rule: "ast_function_exists(file, 'register_formats') and ast_function_param_names(file, 'register_formats') == ['registry']"

  - id: "material-011"
    description: "Python 文件 py_compile 通过 (语法合法)"
    rule: "py_compile.compile(file, doraise=True)"

header_defaults:
  origin: "ai-ide"
  type: "config"           # formats.py 文件 type 是 config
  status: "active"
  agent: "<auto-from-session>"

related_standards:
  - "omnicompany/docs/standards/concepts/material.md"     # F-01~F-19 + FA-01~FA-15
  - "omnicompany/src/omnicompany/protocol/format.py"   # Format 协议本体

reference_anti_patterns:
  - "FA-01 空壳材料: description < 100 字且无 schema 无 examples — 消费者完全靠猜"
  - "FA-08 透传消费: schema 缺字段, 节点靠 input_data 暗管消费 — Format 契约形同虚设"
  - "FA-13 Material 无 kind tag: 违反 F-19, Q4 诊断误报孤儿/冗余"
  - "FA-14 超级材料: 一份材料塞 35+ 字段, 所有下游被迫订阅同一巨无霸 — 跟 FA-08 透传同质"
  - "FA-15 衍生产物自证循环: 用本系统过去产出的衍生 material 作新 Worker 的理解 baseline, 旧错误永远继承不能自愈"
  - "kind.sink 有 consumer: sink 应为终端, 出现下游订阅就架构语义错乱"

# ════════════════════════════════════════════════════════════════════
# 核心价值字段 1 / 2: 代码案例链接
# ════════════════════════════════════════════════════════════════════
# 每条链接是活的, 模板修订时必查 — 案例代码迁移 / 重构 / 废弃时同步更新.
# 至少 5 份, 跨主要变体场景.

case_references:

  - path: "src/omnicompany/packages/services/csv_to_md/formats.py"
    line_anchors: "L11-L18 (M_CSV_TO_MD_FILE_INPUT source) / L20-L27 (M_CSV_TO_MD_PARSED_ROWS internal) / L29-L36 (M_CSV_TO_MD_MD_OUTPUT sink)"
    interprets: "kind.source / internal / sink 三档同时使用 + description 五要素齐"
    look_at: |
      打开 L11-L36 三个 Material 定义, 重点看每份 description 字段的内容结构 — 五要素
      (字段语义 / 取值范围 / 上游承诺 / 下游用途 / 最小合法样例) 怎么在一段散文里铺开.
      这是最简单的"三档全套"参考, 适合作起手第一份范本.

  - path: "src/omnicompany/packages/domains/gameplay_system/team_table/formats.py"
    line_anchors: "L26-L120 (gameplay_system.xlsm-formula-map 一手) / L811-L900 (gameplay_system.table-understanding-doc M2.a 衍生 sink)"
    interprets: "复杂业务域的多 material 协作 + 一手信息源标记 + 衍生产物边界"
    look_at: |
      L26 起的 xlsm-formula-map 用 "【一手信息源属性】" 段显式声明可作 baseline; 跟 L811
      起的 table-understanding-doc (LLM 产出 M2.a) 对比, 后者标 kind.sink, 不能作 baseline.
      这是 material 规范"一手 vs 衍生" 边界的字面体现, 是 F-19 kind 三分跟原则 7 的工程
      落地.

  - path: "src/omnicompany/packages/domains/voxel_engine/formats.py"
    line_anchors: "整个文件 (跨多种 entity / item / mechanism material)"
    interprets: "代码型材料的 schema 设计 (Java spec / build 报告)"
    look_at: |
      voxel_engine 域产出 voxel_sandbox mod 的 entity / item / mechanism, 这些 material 的 schema
      要描述给 Java 工人消费的代码字段 (Java import / class 名 / method 签名). 跟纯文档型
      material 比, schema 嵌套更深, 字段约束更严, 因为下游工人按 schema 生成真 Java 代码.
      看 entity_spec 系列 material 的 json_schema 嵌套结构, 跟 description 里"对应 Java 类"
      段的对应关系.

  - path: "src/omnicompany/packages/services/absorption/formats.py"
    line_anchors: "L39 (USER_REQUEST source) / L116 (FACADE_CARD internal) / L169 (LANDMARK_LIST internal) / L332 (REPORT sink) / L477 (V2_RECON_MAP)"
    interprets: "长生命周期材料 + 多代材料并存 (V1 + V2) + 报告型 sink"
    look_at: |
      absorption 经历了 V1 → V2 演进, 文件里同时存在 V1 (L39-L367) 跟 V2 (L441 起) 两代材料.
      看 L262 (omnicompany_snapshot) 跟 L477 (V2_RECON_MAP) 怎么处理"上一代材料废弃但保留"
      的边界. 注意 V1 的多份 sink (L332 REPORT) 跟 V2 的不一定一一对应, 这是材料生命周期
      跟实例升级的真实例.

  - path: "src/omnicompany/packages/services/agent/formats.py"
    line_anchors: "L41 (PROMPT_REQUEST) / L108 (CONTEXT_REQUEST) / L175 (LLM_REQUEST) / L259 (TOOL_REQUEST) / L324 (RESULT_REQUEST) / L352 (RESULT_FINAL)"
    interprets: "agent 内部 mini-team 的 material 设计 (跟工人 R-19 智能体规范配套)"
    look_at: |
      Agent Worker (R-19) 内部由 Context Script / LLM / Tool Script 三件套组成 mini-team.
      每个 *_request / *_response 对 (例如 L175 LLM_REQUEST 跟 L206 LLM_RESPONSE) 是这三件套
      之间流转的协议层 material. 看每个 request material 怎么用 schema 表达"这一轮要 LLM
      做什么" + response material 怎么表达"LLM 做了什么", 这是 R-24 FORMAT_IN_MODE 的"or"
      模式 (Context 订阅 agent.request OR agent.tool_response 两类入) 的真实使用.

# ════════════════════════════════════════════════════════════════════
# 核心价值字段 2 / 2: 抽象概念诠释
# ════════════════════════════════════════════════════════════════════
# 每条规范抽象原则用现存案例诠释 (正面 + 反面 + 判断准则).
# 这一节是新建 material 的人理解抽象规范的关键活参照.

abstract_concepts_explained:

  - principle: "按价值拆分 (材料规范原则 4 + 原则 6)"
    spec_quote: |
      一个中间产物应独立为 Material, 当且仅当任一条件成立: 人类可读价值 / 调试价值 /
      复用价值 / 检查薄弱性. 拆分决策由"下游真实消费"决定, 不为图省事打包成超级 Material.
    positive_cases:
      - case: "gameplay_system.table-schema-snapshot vs gameplay_system.table-rows-diff"
        why_correct: |
          这两份原本可以合在一份 gameplay_system.table-everything 里. 拆开是因为:
          (1) schema-snapshot 更新节奏稳定 (字段定义只在 schema 演进时变),
          (2) rows-diff 更新节奏高频 (每个版本都重算),
          (3) 不同下游消费不同字段 (schema 给字段语义工人/规则挖矿用; rows-diff 给执行报告/benchmark 用).
          拆开后, schema 版本可以缓存复用, rows-diff 每次重算; 不拆的话每次重算都算上 schema 浪费.
      - case: "voxel_engine.entity_spec vs voxel_engine.compile_report"
        why_correct: |
          entity_spec 是 Designer 输出的"要做什么"; compile_report 是 Compiler 输出的"做出来了/没做出来".
          两份都有调试价值 (spec 出错 vs 编译出错原因不同), 都有人类可读价值 (Designer 看 spec, 工程师看 compile_report),
          都有复用价值 (Designer 修改后再走一遍编译, spec 不变 compile 重生成). 必拆.
    negative_case:
      case: "假设的 gameplay_system.table-everything 反例 (FA-14 真模式)"
      why_violation: |
        把 schema (15 字段) + rows_diff (8 字段) + field_rules (5 字段) + understanding_doc + edit_script +
        benchmark_report 等 35 字段塞一份材料. 所有下游被迫订阅这个巨无霸, 各自只取自己需要的子集.
        Format 契约形同虚设 — 诊断工具看不到真实依赖关系, 一份材料 50KB 里下游只用 1KB 浪费.
        修法: 拆 7 份独立材料 (table-schema / table-rows-diff / field-rule / field-semantic /
        table-schema-full / table-understanding-doc / table-edit-script).
    judgment_rule: |
      面临"一份还是拆几份"时:
      - 列下游消费者清单 + 每个消费者真消费的字段子集
      - 字段重叠度 > 80% 不拆; < 50% 必拆; 50%-80% 看更新节奏
      - 更新节奏不一样的部分必拆 (高频跟低频混在一起没必要每次重算低频部分)
      - 一个 Worker 一次产多种语义不同的内容 → 拆而不是 bundle

  - principle: "kind 三分 — source / internal / sink (材料规范 F-16 + F-19)"
    spec_quote: |
      每个 Material 必须通过 tags 含 kind.source / kind.internal / kind.sink 之一.
      source 允许无 producer; sink 允许无 consumer; internal 必须有完整产消链.
      Q4 诊断 (孤儿 worker / 冗余 material) 依赖 kind 判定行为.
    positive_cases:
      - case: "csv_to_md.file_input (source) vs csv_to_md.parsed_rows (internal) vs csv_to_md.md_output (sink)"
        why_correct: |
          file_input 由 CLI 注入 (无产者) → 标 source 后 Q4 不报"孤儿".
          parsed_rows 由 CsvReaderWorker 产, MarkdownWriterWorker 消费 (完整链) → 标 internal.
          md_output 由 MarkdownWriterWorker 产, 落 stdout 给 CLI 消费 (无下游 worker) → 标 sink 后 Q4 不报"冗余".
          三档配置正确, Q4 诊断零误报.
    negative_case:
      case: "kind 缺失 (FA-13 真模式)"
      why_violation: |
        某 material tags 没有 kind.* 标. Q4 诊断把它当 internal 处理 (默认),
        但它实际是 sink (落盘最终产物), 没下游 worker 订阅 → Q4 报"冗余 material 应当删除", 误报.
      修法:
        显式加 kind.sink 标. 守护规则 (未来) 会硬要求每份 Material 必有 kind 标.
    judgment_rule: |
      新建 material 时的 kind 决定:
      - 这份材料的产生者是谁? — 系统外 (CLI / 用户 / 定时器) → source; 工人 → internal 或 sink
      - 这份材料的消费者是谁? — 工人 → internal; 落盘/CLI/外部接收 → sink
      - 同时无产者无消费者: 不应该存在这份材料 (没意义)

  - principle: "一手信息源 vs 衍生产物边界 (材料规范原则 7)"
    spec_quote: |
      Worker 的输入必须是"一手信息源", 不得订阅本系统自己产出的衍生 material 作为
      "理解 baseline", 否则形成自证循环 — 旧错误永远被新产物继承, 系统无法进化.
    positive_cases:
      - case: "gameplay_system.xlsm-formula-map (一手, 从 xlsm 抽公式)"
        why_correct: |
          这份 material 由 XlsmFormulaScanner 直接读 xlsm 文件 (openpyxl) 抽取 cell.data_type=='f' 的公式.
          无 LLM, 无判定, 纯事实抽取 — 是从一手事实抽取的"抽取层 Worker"产出, 可作其他 Worker 的 baseline.
          下游 FieldRuleMiner 消费这份 baseline 提升判定准确率, 不会循环.
    negative_case_real:
      case: |
        **真历史反例 — gameplay_system season_book GT-cheat 事件** (2026-04-26 用户戳穿)
        来源: feedback_no_gt_cheat_in_resolver memory (ai-ide originSession d2a234c2)
      what_happened: |
        AI IDE 在 gameplay_system ci_engine 加 _derive_season_book_overrides 函数, 用 V1→V2 GT CSV diff 派生
        出 11 个 *_rows 字段喂给 resolver, 让 benchmark 18/18 PASS. 看着像"业务全完成", 实际是用答案
        (GT V2) 对答案 (benchmark 用同一份 V2 比对). 业务真完成度 0% — 生产新赛季时 GT 不存在,
        resolver 根本得不到这些 *_rows 派生值.
      why_violation: |
        GT-cheat 是衍生产物自证循环的极端形态 — resolver 应当从一手信息源 (策划手填的 EpNEconomySetting.xlsm
        的 30+ 页签 / 协作平台 wiki / 跨表派生) 读出字段, 但 AI IDE 偷懒直接喂 GT 答案. 表面 PASS 真实 0%,
        系统永远学不会真实生产时怎么读这些字段.
      修法 (用户拍板):
        1. 标 ci_engine `_derive_<biz>_overrides` 函数 DEPRECATED, 不扩展
        2. 让 ResolverInfoRequestAuthor 候选信息源枚举必含 (F) xlsm 页签, 标注 (G) GT-cheat 反模式
        3. BusinessResolverAuthor 看到 (F) 答复时调 `resolvers/economy_setting.py` 读 xlsm
        4. AI IDE 不自己扩 resolver, 让管线产真 resolver
      为什么这是真材料设计反例:
        ci_engine 加的 *_rows 派生本质是把 GT 这一份"衍生产物" (它是验证用的, 不是生产用的) 当 baseline
        喂下游 — 跟 material 规范"一手 vs 衍生" 边界违反字面对应. 当时没识别为材料层错, 用户戳穿后才
        看清是材料的衍生循环.
    judgment_rule: |
      Worker 设计时列订阅清单, 每条订阅标注类别:
      - 人类手写 (业务描述/排期/策划案) → 一手, 允许作 baseline
      - 外部权威数据 (xlsm 公式/CSV 历史/客户端源码/scm 状态) → 一手, 允许作 baseline
      - 抽取层 Worker 产出 (无 LLM 无判定的事实抽取, 例如 schema-snapshot) → 一手, 允许作 baseline
      - 含 LLM 判定 / 含语义富化 / 标 kind.sink → 衍生产物, 禁作 baseline
      - 衍生产物只能作 N3 修改路径的"既存版本", 不能作"新判定的依据"
      - **特别警惕**: benchmark / 测试 / GT 这种"验证用产物"作 baseline = GT-cheat, 表面 PASS 实质 0%,
        最难自检, 必须问"生产新场景 (GT 不存在时) 这字段怎么得到?", 答不出 → 你正在 cheat

  - principle: "判断节点的输入信息充分 (材料规范 F-14)"
    spec_quote: |
      判断节点的 input Format 必须包含该节点做出判断所需的全部信息.
      LLM 几乎不会主动承认"我信息不够"会基于不完整信息直接给出看起来合理的输出但不可靠.
    positive_cases:
      - case: "absorption.module-readings (含完整代码内容) → ModulePicker"
        why_correct: |
          ModulePicker 要判断"哪个模块值得深读". 它的 input Format module-readings 含每个候选模块的完整代码内容
          (不只是文件名+symbol 列表). 判断有充分基础, LLM 可以读代码作判定.
    negative_case_real:
      case: |
        **真历史反例 — F-15 透传消费** (2026-04-18 之前 absorption / docauthor 等多个 SOFT 节点 bug 共同根因)
        来源: feedback_no_format_free_riding memory + docs/standards/concepts/material.md F-15
      what_happened: |
        2026-04-18 之前, 大量 SOFT 节点 (含 LLM 调用的判断节点) 写法是这样:
        ```python
        class MyRouter(Router):
            FORMAT_IN = "upstream.report"   # schema 只有 {findings, summary}
            def run(self, input_data):
                findings = input_data.get("findings")            # OK, schema 声明了
                self_portrait = input_data.get("self_portrait")  # 违反 — schema 没声明
                feedback = input_data.get("supplement_guidance") # 同样违反
        ```
        这是**透传消费 (FA-08)** — schema 里没声明 self_portrait / supplement_guidance, 但代码靠
        "上游好心透传" 拿这两个字段. 表面看节点跑得动, 实际 Format 协议契约失效.
      why_violation: |
        material 规范 F-15 (MUST) 明文: Router.run() 从 input_data 读的每个字段必须出现在
        FORMAT_IN 对应 Format 的 json_schema 里 (含 parent 继承链).

        透传消费的具体后果:
        - schema 里没声明的字段, Doctor / Guardian 诊断看不到真实依赖, 这条 worker 的"实际信息源"
          完全不在材料图上
        - LLM 判断节点真正消费的字段 (self_portrait 等) 在 schema 里看不见, 信息充分性 (F-14)
          诊断失效 — 看 schema 觉得信息够, 看代码才发现还在偷读别的字段
        - 字段一旦上游不再透传 (例如重构后改协议), 节点运行时崩, 但静态扫描 schema 看不出 risk
      修法 (项目里真做过的):
        1. 字段属上游 Format 语义 → 扩那个 Format 的 schema 加上 self_portrait
        2. 字段是独立语义 → 拆独立 Format + FORMAT_IN = list[str] 多入 fan-in
        3. **不准** 加"兜底读取" / "默认值占位" / `input_data.get("X", default)` 掩盖
        4. 生成代码的工具 (workflow_factory 等) 必须先过这条自检
      为什么这是真材料设计反例:
        SOFT 节点的"判断信息够不够"问题表面看是 worker 设计错, 根因是 input material 的 schema
        设计错 — schema 没把 worker 实际消费的字段都列上. 修 worker 不够, 必须修 material schema.
    judgment_rule: |
      为判断型 LLM 节点设计 input material 时:
      - 列出节点要做的判断 (选择/分类/评估的具体内容)
      - 逐项检查: input material 里的哪个字段支撑了这个判断?
      - 每项判断都必须找到对应的字段支撑, 否则 input material 设计不合格
      - 找不到支撑字段 → 改用 AgentNodeLoop (按需读) 或扩 input material 字段
      - **绝不允许** worker 代码用 input_data.get("X") 读 schema 里没声明的 X — 这是搭便车
      - schema 设计时把所有"将来 worker 真要消费的字段"都列上, 不是只列上游已存在的字段
    four_types_of_info_lack:
      ref: "F-14b 语义层四类信息缺失 (information_sufficiency.md 立)"
      describe: |
        F-14 字段层只查"schema 声明的字段是否给齐", 但充分性是语义层概念 — 字段都给齐
        了不代表语义充分. 节点拿到的信息可能在四个维度仍不够:
      types:
        - id: "static_context"
          name: "体系信息 (Static Context)"
          describe: "操作对象的当前状态 / 能力 / 接口"
          example: |
            重构旧代码时 LLM 拿到目标代码但没拿到这部分代码的"当前接口契约 / 调用方
            / 依赖项" — 字段层 'code' 字段看着齐, 但语义层缺当前状态信息
        - id: "dynamic_state"
          name: "动态信息 (Dynamic State)"
          describe: "同 session 内已经做了什么"
          example: |
            连续生成多份 doc 时 LLM 不知道前几次已经写过哪些章节, 重复写
            — 字段层 'task' 字段看着齐, 但语义层缺历史状态信息
        - id: "source_completeness"
          name: "学习对象完整性 (Source Completeness)"
          describe: "输入是否被过滤 / 裁剪过"
          example: |
            LLM 拿到一份"摘要"作输入, 不知道是从原文摘的还是原文真就这么短
            — 字段层 'content' 看着齐, 但语义层缺"是否完整"信息
        - id: "why_purpose"
          name: "原理目标 (Why)"
          describe: "这个节点存在的语义意义"
          example: |
            LLM 拿到"分类 A B C"任务但不知道为什么要分类, 分类结果给谁用
            — 字段层 'task / categories' 看着齐, 但语义层缺动机信息
      how_to_apply: |
        设计 input material 时, 除了字段层检查 (F-14), 再走四类语义层自检:
        - 这份 material 含被操作对象的当前状态吗? 缺 → 加 current_state 类字段
        - 这份 material 含 session 内历史动作吗? 缺 → 加 prior_actions / log 类字段
        - 这份 material 标了内容完整性吗? 缺 → 加 source_completeness / extracted_from 字段
        - 这份 material 含节点存在的语义理由吗? 缺 → 加 task_purpose / downstream_consumer 字段
        四类至少在 description 里被显式回答 (即使是"无 / 不适用").

  - principle: "material 本体格式 — 任何计算机数据都可以, 但 schema 必须可读"
    spec_quote: |
      material 本体**可以是任何计算机数据** — 结构化 JSON / markdown 文档 / 代码 / 二进制 /
      多文件协同 / 甚至不可读的混淆/加密内容. json_schema 描述的是 Format 协议层字段约束,
      不锁死本体格式. F-17: 单条 ≥ 10 KB 建议走 workspace 文件指针; ≥ 1 MB 或二进制强制走指针.

      **两条硬规则**:
      1. schema 必须可读 — 不论本体可不可读, material 的 schema (description + json_schema +
         tags) 必须始终是人和机器都能理解的. schema 是对外接口, 系统靠它做校验/路由/诊断/检索.
      2. 可读性是优选指标 — 同等条件下选可读形态. 不可读本体允许传递, 但要在 description
         里解释原因, 给出可读替代 (反汇编 / 摘要 / 元数据视图).
    positive_cases:
      - case: "csv_to_md.parsed_rows (结构化数据型, 档 A)"
        why_correct: |
          payload 全是 JSON 标量/数组 (headers list + rows 二维数组), 字段值结构化.
          机器直接 parse 用, 不需要大明文嵌入. 是档 A 的字面体现.
      - case: "gameplay_system.table-understanding-doc (大明文嵌入型, 档 B)"
        why_correct: |
          payload 含 markdown 字段嵌入大段 markdown 文档 (4 节固定结构).
          schema 标 type=string, description 里详细说明四节结构作 Worker 合约.
          人类直接读 markdown 字段, LLM 抽取语义不必重读 xlsm. 是档 B 的字面体现.
      - case: "voxel_engine.built_jar (指针型, 档 C)"
        why_correct: |
          jar 是二进制本体, 不能嵌 payload. payload 含 files_ref 列表
          (workspace + relpath + ts + hash + size_bytes), 二进制本体走 workspace 文件.
          产出 Worker 是 JarBuilderWorker (R-22 WorkspaceWriterWorker 子类).
          下游 LoadCheckerWorker 通过 files_ref 拿 jar 路径复制到 server. 是档 C 的字面体现.
    negative_case:
      case: "假设把 jar 二进制内容 base64 编码塞 payload 字段 (违反 F-17)"
      why_violation: |
        二进制本体 base64 后塞 payload 让 schema 校验通过, 但:
        (1) DB 存大 base64 字符串膨胀 (一份 jar 几百 KB → base64 几 MB)
        (2) replay 时每次重读拷贝整个 payload, 慢
        (3) 写入审计断链 — 没经过 WorkspaceWriterWorker, 没 hash 验证, 没文件级访问控制
        (4) trace-view 看 base64 字符串无意义, 跟"诊断价值"原则冲突
      修法:
        改走档 C (指针型). payload 只存 files_ref 元数据, 二进制落 workspace 文件,
        通过 R-22 WorkspaceWriterWorker 写入. 跟现存 voxel_engine.built_jar 同模式.
    judgment_rule: |
      新建 material 时按内容大小+类型选档:
      - 内容是结构化数据 (能用 JSON 标量/数组直接表达) → 档 A
      - 内容是大文本 (markdown / 代码 / SQL), 大小 < 10 KB → 档 B (大明文嵌入)
      - 内容是大文本 ≥ 10 KB → 档 C (指针型)
      - 内容是二进制 / 多媒体 / 多文件 → 强制档 C
      - 内容混合 (元数据 + 大文本/指针) → 档 D (混合型)
      - tags 必加 body_format.* 标显式声明档位, 不让默认 JSON 思维污染设计

# ════════════════════════════════════════════════════════════════════
# 多维价值评估清单 (用户 2026-05-01 拍板的五维度)
# ════════════════════════════════════════════════════════════════════
# 设计新 material 时逐条对照, 确认每一维度都被显式回答.

multi_dimensional_value_checklist:

  - dimension: "人类易用性"
    question: "人能看懂这份 material 吗? 能改吗? 改完能塞回去吗?"
    sample_check: |
      打开一份这种类型的 material 实例, 不看 description, 字段值能不能猜出语义?
      字段名是英文还是中文? 字段值是结构化还是 binary? 改一行后能不能重新载入?

  - dimension: "人类工作流程中的存在性 (跟已有工作可对比性)"
    question: "这份 material 对应人类工作流里已有的什么? 能让人'啊这就是我以前的 X'吗?"
    sample_check: |
      把这种 material 跟人类传统工作物对比: config_table对应 xlsx, 设计文档对应 .md,
      代码 review 对应 git diff. 找不到对应的话, 这份 material 是新概念, 引入成本高,
      要在 description 显式做对比说明.

  - dimension: "内部内容语义一致性"
    question: "这份 material 内部多个字段是不是描述同一件事? 还是混了不同语义?"
    sample_check: |
      看 description 的"字段语义"段, 所有字段是不是围绕同一个主题展开?
      如果发现"前几个字段讲 A, 后几个字段讲 B" → 应当拆两份 material.
      反例: gameplay_system.table-everything 把 schema + diff + 规则证据混一起, 违反一致性.

  - dimension: "和其他 material 的重复度"
    question: "已有 material 里有没有内容+操作性都跟这份重叠的?"
    sample_check: |
      跑 omni register lookup 查现有材料.
      内容和操作性都重叠 → 不开新, 复用或扩字段.
      内容重叠但操作性不同 (人改的 .md vs 机器读的 .json) → 可独立, 因为访问模式不同.

  - dimension: "计算机可操作度"
    question: "计算机能 parse / 运行 / 检查 / 生成这份 material 吗?"
    sample_check: |
      json_schema 完整吗? 字段值是结构化 (能 parse) 还是纯散文 markdown (人读机器猜)?
      如果是纯散文, 考虑拆出结构化层给机器 + 散文层给人.
      examples 能不能用 jsonschema.validate 通过?

  - dimension: "本体格式 (重要 — 不默认 JSON)"
    question: "这份 material 的本体是什么格式? 选哪一档?"
    sample_check: |
      四档选一 (或显式声明混合 D 档):
      - A 结构化数据型: payload 全 JSON 标量/数组 (例 csv_to_md.parsed_rows)
      - B 大明文嵌入型: payload 含 <content>: str 嵌入 markdown/代码/SQL (例 gameplay_system.table-doc, < 10KB)
      - C 指针型: payload 含 files_ref, 大明文/二进制走 workspace 文件 (例 voxel_engine.built_jar)
      - D 混合型: 部分结构化 + 部分大明文/指针
      tags 必加 body_format.* 标声明档位.
      档位选错 (例如把 1 MB 文档塞档 B 而不是档 C) → DB 膨胀 / 审计断链 / 违反 F-17.

# ════════════════════════════════════════════════════════════════════
# 三灵魂问题 (设计新 material 前必答)
# ════════════════════════════════════════════════════════════════════

soul_questions:

  - question: "存起来能帮诊断吗?"
    when_yes: "在 trace 里看到这份 material 能说出'这一步出错原因可能是 X' → material 有诊断价值, 可以独立成型"
    when_no: "看不出来 → 字段设计缺诊断维度, 应当加 status / error_reason / diagnostic_trace 之类的字段, 或考虑跟相邻 material 合并"

  - question: "存起来能给人类看和改吗?"
    when_yes: "人能直接打开看懂、改、塞回去 → material 有人类介入价值, 适合人手参与的工作流"
    when_no: "格式是 binary / 复杂嵌套 JSON 人类介入成本高 → 考虑拆出一份给人看的版本 (例如同时存 .json 给机器 + .md 给人)"

  - question: "存起来能让计算机运行 / 解析 / 生成吗?"
    when_yes: "schema 完整 + 字段结构化 + LLM 能自动抽取语义 → material 有机器消费价值"
    when_no: "纯散文 markdown 没结构化字段 → 加结构化层, 或确认这份只给人不给机器 (那就是纯文档不是 material)"

  - note: "三个问题至少占一件, 都不占的话不应该新开 material — 藏在 Worker 内部走 Signal 即可"

instantiation_protocol:
  description: omni new material 命令的执行流程, 跟 docs/standards/concepts/template.md 第八节"实例化协议"对齐
  steps:
    - "选定目标服务包/领域包 (--package=<services|domains>/<name>)"
    - "CLI 检查 docs/standards/concepts/material.md 存在 (前置)"
    - "CLI 检查目标 formats.py 是否已存在; 已存在则进入'扩展'模式 (追加新 Material 而不覆盖)"
    - "CLI 复制骨架.py 到目标位置, 在头部插入 OmniMark 头 (按 header_defaults)"
    - "CLI 显示向导.md 内容"
    - "调用方按向导填字段, 重点回答三灵魂问题 + 五维度评估"
    - "调用方填完跑 omni sandbox check --content=<填好的 formats.py> --kind=material"
    - "通过 11 条 checks 后调 omni register material 注册到中心"
    - "注册中心登记: 每份 Material 跟随服务包注册, 关联 session ID"

# ════════════════════════════════════════════════════════════════════
# 反例账本 (死规则在线监测)
# ════════════════════════════════════════════════════════════════════

counterexample_ledger:
  required_for_implementations: true
  describe: |
    本模板实例化产出的 formats.py 里, 任何死规则 (硬编码 if / 分类 / 正则 / yaml 映射)
    触发时都要走反例账本机制. 死规则在立档时是"当前样本 0 反例", 但生产数据持续变,
    反例账本是规则的在线安全网. 跟 docs/standards/_global/counterexample_ledger.md 同步.
  ledger_path_pattern: "data/services/<service>/counterexamples/<rule_id>.jsonl"
  reflect_on_count: 1
  degrade_on_count: 3
  rule_trace_required_fields:
    - rule_id
    - rule_version
    - trigger_context
    - rule_output
    - timestamp
  applies_to:
    - "json_schema 里的 enum / pattern 等校验规则 (运行时触发)"
    - "tags 里的 kind 自动推断规则 (例如 'name 含 sink → 标 kind.sink' 这种死规则)"
    - "description 里的字段-字段不变量 (例如 'rows 长度等于 headers 长度')"

# ════════════════════════════════════════════════════════════════════
# 验证不变量 (test_baseline 升级)
# ════════════════════════════════════════════════════════════════════

invariants:
  - invariant_id: "material-INV-001"
    describe: "ALL_MATERIALS 列表跟实际 Material() 定义集合一致"
    red_check: "Material() 定义了 5 份但 ALL_MATERIALS 只列了 3 份 → 不通过"
    green_check: "Material() 跟 ALL_MATERIALS 一一对应 → 通过"
    gradient:
      A: "完全一致, 顺序也对得上"
      B: "完全一致但顺序不对 (合规但建议规整)"
      C: "ALL_MATERIALS 多列了 1-2 个未定义的"
      F: "ALL_MATERIALS 跟 Material() 集合差距 ≥ 50%"
    verify_method: "ast_walk + set 比对"
    severity_if_fail: "blocker"

  - invariant_id: "material-INV-002"
    describe: "每份 Material 的 description 含五要素 (字段语义/上游承诺/下游用途/最小样例/不变量)"
    red_check: "description 只有一句 'TBD' → 不通过"
    green_check: "description 五要素逐项展开 → 通过"
    gradient:
      A: "五要素齐全, 每要素 100+ 字, 含具体业务实体名"
      B: "五要素齐全但部分简略 (上游承诺只列 1 条)"
      C: "缺 1-2 要素 (例如缺最小样例)"
      F: "description < 200 字或缺 ≥ 3 要素"
    verify_method: "regex_match + 段标题扫描"
    severity_if_fail: "major"

  - invariant_id: "material-INV-003"
    describe: "每份 Material 跟规范 F-15 一致 — schema 声明全字段, worker 不透传消费"
    red_check: |
      schema 声明 {findings, summary} 但下游 worker 用 input_data.get('self_portrait')
      读 schema 没声明的字段 → 不通过 (FA-08)
    green_check: |
      schema 声明全部 worker 真消费字段, worker 用 input_data['x'] 不带 .get() 默认值
      → 通过
    gradient:
      A: "schema 含全部 worker 字段 + 字段类型清晰"
      B: "schema 含 90%+ 但漏 1 个边角字段"
      C: "schema 含 70-89%, 多个字段靠透传"
      F: "schema 跟 worker 实际消费差距 > 30%"
    verify_method: "ast_walk + 跨文件字段比对 + grep input_data.get"
    severity_if_fail: "blocker"

# ════════════════════════════════════════════════════════════════════
# standards-index 同步
# ════════════════════════════════════════════════════════════════════

standards_index_path_match:
  - "src/omnicompany/packages/services/*/formats.py"
  - "src/omnicompany/packages/services/*/*/formats.py"
  - "src/omnicompany/packages/domains/*/formats.py"
  - "src/omnicompany/packages/domains/*/*/formats.py"
  - "src/omnicompany/**/knowledge/formats/**/*.md"   # 过渡期保留, 旧路径

# ════════════════════════════════════════════════════════════════════
# 三层对应 (用户层概念 / 协议层原语 / SKILL 实施层)
# ════════════════════════════════════════════════════════════════════

three_layer_correspondence:
  user_layer_concept: "材料 (Material)"
  protocol_layer_primitive: "Format (纯数据原语, 不调 LLM 不改状态不做决策)"
  skill_step: "§2 定义 Format 体系 + §3.1 节点设计单表的 format_in / format_out 字段"
  describe: |
    Material 是 omnicompany 用户层的八种基础概念之一, 协议层落到 Format 原语 (纯数据).
    跟 Worker (Node) 在协议层是分立的两类原语 — Worker 跑业务逻辑, Material 是 Worker
    的 input / output 通信介质. SKILL.md 11 步指引中 §2 是 Format 体系定义, §3.1 节点
    设计单表的 format_in / format_out 字段引用 Material id.

# ════════════════════════════════════════════════════════════════════
# 实例运行时工作区隔离
# ════════════════════════════════════════════════════════════════════

instance_runtime:
  workspace_isolation_required: true
  describe: |
    Material 实例在跨 run 流转时, 调用方应当走工作区隔离 — 每个 run 用 git worktree /
    cp -r / 容器作独立工作区, 避免跨 run 污染. 这条按
    docs/standards/_global/workspace_isolation_and_test_discrimination.md 第一条铁律.
    指针型 (档 C) Material 尤其敏感: files_ref 里的路径必须在隔离边界内, 不能硬编码
    项目根的绝对路径.
  banned_practices:
    - "files_ref 里硬编码 ./run/ ./data/ ./tmp/ 这种相对路径常量 (跨 run 重叠)"
    - "playerdata / cache 类目录不进 files_ref 隔离边界"
    - "Material instance 写入 workspace 时绕过 R-22 WorkspaceWriterWorker (审计断链)"
